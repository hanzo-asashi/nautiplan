name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelog & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feature", "enhancement"]
                },
                {
                  "title": "## 🐛 Bug Fixes",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## 🎨 UI/UX",
                  "labels": ["ui", "design", "frontend"]
                },
                {
                  "title": "## 📝 Documentation",
                  "labels": ["documentation", "docs"]
                },
                {
                  "title": "## 🧪 Tests",
                  "labels": ["test", "testing"]
                },
                {
                  "title": "## 🔧 Maintenance",
                  "labels": ["chore", "maintenance", "refactor"]
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^feat",
                  "target": "feature"
                },
                {
                  "pattern": "^fix",
                  "target": "fix"
                },
                {
                  "pattern": "^docs",
                  "target": "documentation"
                },
                {
                  "pattern": "^test",
                  "target": "test"
                },
                {
                  "pattern": "^chore",
                  "target": "chore"
                },
                {
                  "pattern": "^refactor",
                  "target": "refactor"
                },
                {
                  "pattern": "^style|^ui|^design",
                  "target": "ui"
                }
              ],
              "sort": {
                "order": "ASC",
                "on_property": "mergedAt"
              },
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}",
              "pr_template": "- #{{TITLE}} (#{{NUMBER}})",
              "empty_template": "No changes.",
              "transformers": [],
              "max_tags_to_fetch": 200,
              "max_pull_requests": 200,
              "max_back_track_time_days": 365
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog from Commits
        id: commits_changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -i "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -i "^- fix" || true)
          DOCS=$(echo "$COMMITS" | grep -i "^- docs" || true)
          TESTS=$(echo "$COMMITS" | grep -i "^- test" || true)
          STYLE=$(echo "$COMMITS" | grep -iE "^- (style|ui|design)" || true)
          CHORE=$(echo "$COMMITS" | grep -iE "^- (chore|refactor|build|ci)" || true)
          OTHER=$(echo "$COMMITS" | grep -ivE "^- (feat|fix|docs|test|style|ui|design|chore|refactor|build|ci)" || true)

          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}## 🚀 Features\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}## 🐛 Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$STYLE" ]; then
            CHANGELOG="${CHANGELOG}## 🎨 UI/UX\n${STYLE}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}## 📝 Documentation\n${DOCS}\n\n"
          fi
          if [ -n "$TESTS" ]; then
            CHANGELOG="${CHANGELOG}## 🧪 Tests\n${TESTS}\n\n"
          fi
          if [ -n "$CHORE" ]; then
            CHANGELOG="${CHANGELOG}## 🔧 Maintenance\n${CHORE}\n\n"
          fi
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}## 📦 Other\n${OTHER}\n\n"
          fi

          # Write to file for the release step
          echo -e "$CHANGELOG" > /tmp/changelog.md

          # Set output
          {
            echo "changelog<<EOF"
            echo -e "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.commits_changelog.outputs.changelog }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
